{% extends "admin/base.html" %}

{% block content %}

<style>
/* ===== MODERN DASHBOARD STYLE (ONLY CSS) ===== */

.dashboard-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
}

/* CARD GLASS STYLE */
.dashboard-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(30, 94, 255, 0.12);
    border-radius: 18px;

    padding: 25px;
    text-align: center;

    box-shadow: 0 10px 30px rgba(0,0,0,0.06);

    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

/* LIGHT BLUE GLOW */
.dashboard-card::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 140px;
    height: 140px;
    background: radial-gradient(circle, rgba(30,94,255,0.25), transparent 70%);
    filter: blur(15px);
}

/* HOVER EFFECT */
.dashboard-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    border-color: rgba(30,94,255,0.3);
}

/* TITLE */
.dashboard-card h3 {
    font-size: 13px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* NUMBER */
.dashboard-card p {
    font-size: 42px;
    font-weight: 900;
    color: #0f172a;
    margin-top: 10px;
}

/* HEADER */
.admin-header h1 {
    font-size: 28px;
    font-weight: 900;
    color: #0f172a;
}

/* QUICK BUTTON */
.quick-action {
    display: inline-block;
    margin-top: 20px;

    padding: 12px 18px;
    border-radius: 12px;

    background: linear-gradient(135deg, #1e5eff, #4f86ff);
    color: white;
    text-decoration: none;

    font-weight: 700;

    box-shadow: 0 10px 25px rgba(30,94,255,0.25);

    transition: all 0.25s ease;
}

.quick-action:hover {
    transform: scale(1.05);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .dashboard-card p {
        font-size: 30px;
    }
}
</style>

<div class="admin-header">
    <h1>Дашборд</h1>
</div>

<div class="dashboard-cards">

    <div class="dashboard-card" style="background:#000;color:white;">
        <h3>Всего новостей</h3>
        <p>{{ total_news }}</p>
    </div>

    <div class="dashboard-card" style="background:#FFC82E;color:#333;">
        <h3>Просмотры</h3>
        <p>{{ total_views }}</p>
    </div>

    <div class="dashboard-card" style="background:#4b4b4b;color:white;">
        <h3>Категории</h3>
        <p>{{ categories_count }}</p>
    </div>

</div>

<div style="margin-top:3rem;">
    <h3>Быстрые действия</h3>

    <a href="{{ url_for('admin.news_add') }}" class="quick-action">
        + Добавить новость
    </a>
</div>

{% endblock %}
