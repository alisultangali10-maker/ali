{% extends "admin/base.html" %}

{% block content %}

<style>
/* ===== DASHBOARD (WHITE + BLUE GLASS STYLE) ===== */

.dashboard-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 22px;
}

/* GLASS CARD */
.dashboard-card {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border: 1px solid rgba(30, 94, 255, 0.12);
    border-radius: 18px;

    padding: 28px;
    text-align: center;

    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);

    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.dashboard-card::before {
    content: '';
    position: absolute;
    top: -50px;
    right: -50px;
    width: 160px;
    height: 160px;
    background: radial-gradient(circle, rgba(30,94,255,0.25), transparent 70%);
    filter: blur(20px);
}

.dashboard-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    border-color: rgba(30,94,255,0.3);
}

.dashboard-card h3 {
    font-size: 13px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
}

.dashboard-card p {
    font-size: 44px;
    font-weight: 900;
    color: #0f172a;
    margin-top: 12px;
}

/* HEADER */
.admin-header h1 {
    font-size: 28px;
    font-weight: 900;
    color: #0f172a;
}

/* QUICK ACTIONS */
.quick-actions {
    margin-top: 3rem;
}

.quick-actions h3 {
    font-size: 16px;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 14px;
}

.quick-action {
    display: inline-block;
    padding: 12px 18px;
    border-radius: 12px;

    background: linear-gradient(135deg, #1e5eff, #4f86ff);
    color: white;
    text-decoration: none;

    font-weight: 700;

    box-shadow: 0 10px 25px rgba(30,94,255,0.25);

    transition: all 0.25s ease;
}

.quick-action:hover {
    transform: translateY(-3px) scale(1.03);
}
</style>

<div class="admin-header">
    <h1>Дашборд</h1>
</div>

<div class="dashboard-cards">

    <div class="dashboard-card">
        <h3>Всего новостей</h3>
        <p>{{ total_news }}</p>
    </div>

    <div class="dashboard-card">
        <h3>Просмотры</h3>
        <p>{{ total_views }}</p>
    </div>

    <div class="dashboard-card">
        <h3>Категории</h3>
        <p>{{ categories_count }}</p>
    </div>

</div>

<div class="quick-actions">
    <h3>Быстрые действия</h3>

    <a href="{{ url_for('admin.news_add') }}" class="quick-action">
        + Добавить новость
    </a>
</div>

{% endblock %}
