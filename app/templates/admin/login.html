{% extends "admin/base.html" %}

{% block login %}

<style>
/* ===== LOGIN MODERN GLASS BLUE ===== */

.login-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;

    background: linear-gradient(135deg, #eaf2ff, #f7f9ff);
    font-family: Inter, sans-serif;
}

/* CARD */
.login-box {
    width: 100%;
    max-width: 420px;

    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(18px);

    border: 1px solid rgba(30,94,255,0.15);
    border-radius: 18px;

    padding: 35px;

    box-shadow: 0 20px 60px rgba(15,23,42,0.12);
}

/* TITLE */
.login-box h2 {
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    color: #1e5eff;
    margin-bottom: 25px;
}

/* INPUTS */
label {
    font-size: 13px;
    font-weight: 700;
    color: #334155;
    display: block;
    margin-bottom: 6px;
}

input {
    width: 100%;
    padding: 12px 14px;

    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.08);

    outline: none;
    transition: 0.2s;

    margin-bottom: 16px;
}

input:focus {
    border-color: #1e5eff;
    box-shadow: 0 0 0 4px rgba(30,94,255,0.12);
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;

    border: none;
    border-radius: 14px;

    font-weight: 900;
    font-size: 15px;

    color: white;
    background: linear-gradient(135deg, #1e5eff, #4f86ff);

    cursor: pointer;

    box-shadow: 0 10px 25px rgba(30,94,255,0.25);
    transition: 0.25s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(30,94,255,0.35);
}

/* ERROR */
.error {
    color: #ef4444;
    text-align: center;
    margin-bottom: 15px;
    font-weight: 600;
}
</style>

<div class="login-wrap">

    <div class="login-box">

        <h2>Вход в админку</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">

            <label>Логин</label>
            <input type="text" name="username" required>

            <label>Пароль</label>
            <input type="password" name="password" required>

            <button type="submit">Войти</button>

        </form>

    </div>

</div>

{% endblock %}
