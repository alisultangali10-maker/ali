{% extends "admin/base.html" %}

{% block content %}

<style>
/* ===== MODERN NEWS FORM (WHITE + BLUE GLASS) ===== */

.form-container {
    max-width: 900px;
    margin: 20px auto;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(30,94,255,0.12);
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */
.form-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.form-header h1 {
    font-size: 26px;
    font-weight: 900;
    color: #0f172a;
}

.back-link {
    color: #64748b;
    text-decoration: none;
    font-weight: 600;
}

.back-link:hover {
    color: #1e5eff;
}

/* INPUTS */
label {
    display: block;
    font-weight: 700;
    margin-bottom: 6px;
    color: #334155;
    font-size: 13px;
}

input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.08);
    background: white;
    font-family: inherit;
    outline: none;
    transition: 0.2s;
    margin-bottom: 16px;
}

input:focus, select:focus, textarea:focus {
    border-color: #1e5eff;
    box-shadow: 0 0 0 4px rgba(30,94,255,0.12);
}

/* FIELDSET */
fieldset {
    border: 1px solid rgba(30,94,255,0.12);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    background: rgba(238,244,255,0.3);
}

legend {
    font-weight: 800;
    color: #1e5eff;
    padding: 0 10px;
}

/* IMAGE PREVIEW */
.preview-img {
    width: 120px;
    border-radius: 10px;
    margin-bottom: 10px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn-save {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 900;
    color: white;
    background: linear-gradient(135deg, #1e5eff, #4f86ff);
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(30,94,255,0.25);
    transition: 0.25s;
}

.btn-save:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(30,94,255,0.35);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .form-container {
        padding: 20px;
    }
}
</style>

<div class="form-container">

    <div class="form-header">
        <h1>
            {% if news %}Редактировать новость{% else %}Добавить новость{% endif %}
        </h1>

        <a href="{{ url_for('admin.news_list') }}" class="back-link">
            ← Назад
        </a>
    </div>

    <form method="POST" enctype="multipart/form-data">

        <!-- CATEGORY -->
        <label>Категория</label>
        <select name="category_id" required>
            {% for cat in categories %}
                <option value="{{ cat.id }}"
                    {% if news and news.category_id == cat.id %}selected{% endif %}>
                    {{ cat.code }}
                </option>
            {% endfor %}
        </select>

        <!-- IMAGE -->
        <label>Фото новости</label>

        {% if news and news.image_filename %}
            <img class="preview-img"
                 src="{{ url_for('static', filename='images/uploads/' ~ news.image_filename) }}">
        {% endif %}

        <input type="file" name="image" accept="image/*">

        <!-- KZ -->
        <fieldset>
            <legend>Қазақша</legend>

            <label>Заголовок</label>
            <input type="text" name="title_kk"
                   value="{{ news.title_kk if news else '' }}" required>

            <label>Текст</label>
            <textarea name="content_kk" rows="5" required></textarea>
        </fieldset>

        <!-- RU -->
        <fieldset>
            <legend>Русский</legend>

            <label>Заголовок</label>
            <input type="text" name="title_ru"
                   value="{{ news.title_ru if news else '' }}" required>

            <label>Текст</label>
            <textarea name="content_ru" rows="5" required></textarea>
        </fieldset>

        <!-- EN -->
        <fieldset>
            <legend>English</legend>

            <label>Title</label>
            <input type="text" name="title_en"
                   value="{{ news.title_en if news else '' }}" required>

            <label>Content</label>
            <textarea name="content_en" rows="5" required></textarea>
        </fieldset>

        <button type="submit" class="btn-save">
            💾 Сохранить
        </button>

    </form>

</div>

{% endblock %}
