{% extends "admin/base.html" %}

{% block content %}
<div class="admin-header">
    <h1 style="color:#ffd500;">
        {% if news %}Редактировать новость{% else %}Добавить новость{% endif %}
    </h1>

    <a href="{{ url_for('admin.news_list') }}"
       style="color:#aaa; text-decoration:none;">
        &larr; Назад
    </a>
</div>

<form method="POST"
      enctype="multipart/form-data"
      style="max-width:800px;
             display:flex;
             flex-direction:column;
             gap:1.5rem;
             background:#0a0a0a;
             padding:20px;
             border-radius:12px;
             border:1px solid rgba(255,213,0,0.15);
             box-shadow:0 10px 40px rgba(0,0,0,0.8);">

    <!-- CATEGORY -->
    <div>
        <label style="color:#ffd500; font-weight:bold; display:block; margin-bottom:5px;">
            Категория
        </label>

        <select name="category_id" required
                style="width:100%;
                       padding:10px;
                       border-radius:6px;
                       border:1px solid rgba(255,213,0,0.2);
                       background:#111;
                       color:white;">
            {% for cat in categories %}
            <option value="{{ cat.id }}"
                {% if news and news.category_id == cat.id %}selected{% endif %}>
                {{ cat.code }}
            </option>
            {% endfor %}
        </select>
    </div>

    <!-- IMAGE -->
    <div>
        <label style="color:#ffd500; font-weight:bold; display:block; margin-bottom:5px;">
            Фото новости (Опционально)
        </label>

        {% if news and news.image_filename %}
        <div style="margin-bottom:10px;">
            <img src="{{ url_for('static', filename='images/uploads/' ~ news.image_filename) }}"
                 style="max-height:120px;
                        border-radius:8px;
                        border:1px solid rgba(255,213,0,0.2);">
        </div>
        {% endif %}

        <input type="file" name="image" accept="image/*"
               style="width:100%;
                      color:white;">
    </div>

    <!-- KAZAKH -->
    <fieldset style="border:1px solid #ffd500;
                     padding:1rem;
                     border-radius:8px;
                     background:#0f0f0f;">
        <legend style="color:#ffd500; font-weight:bold;">
            Қазақша (Kazakh)
        </legend>

        <label style="color:#ccc;">Заголовок (KK)</label>
        <input type="text" name="title_kk"
               value="{{ news.title_kk if news else '' }}"
               required
               style="width:100%;
                      padding:10px;
                      background:#111;
                      color:white;
                      border:1px solid rgba(255,213,0,0.2);
                      border-radius:6px;
                      margin-bottom:10px;">

        <label style="color:#ccc;">Текст (KK)</label>
        <textarea name="content_kk" rows="5"
                  required
                  style="width:100%;
                         padding:10px;
                         background:#111;
                         color:white;
                         border:1px solid rgba(255,213,0,0.2);
                         border-radius:6px;"></textarea>
    </fieldset>

    <!-- RUSSIAN -->
    <fieldset style="border:1px solid #ffd500;
                     padding:1rem;
                     border-radius:8px;
                     background:#0f0f0f;">
        <legend style="color:#ffd500; font-weight:bold;">
            Русский (Russian)
        </legend>

        <label style="color:#ccc;">Заголовок (RU)</label>
        <input type="text" name="title_ru"
               value="{{ news.title_ru if news else '' }}"
               required
               style="width:100%;
                      padding:10px;
                      background:#111;
                      color:white;
                      border:1px solid rgba(255,213,0,0.2);
                      border-radius:6px;
                      margin-bottom:10px;">

        <label style="color:#ccc;">Текст (RU)</label>
        <textarea name="content_ru" rows="5"
                  required
                  style="width:100%;
                         padding:10px;
                         background:#111;
                         color:white;
                         border:1px solid rgba(255,213,0,0.2);
                         border-radius:6px;"></textarea>
    </fieldset>

    <!-- ENGLISH -->
    <fieldset style="border:1px solid #ffd500;
                     padding:1rem;
                     border-radius:8px;
                     background:#0f0f0f;">
        <legend style="color:#ffd500; font-weight:bold;">
            English
        </legend>

        <label style="color:#ccc;">Заголовок (EN)</label>
        <input type="text" name="title_en"
               value="{{ news.title_en if news else '' }}"
               required
               style="width:100%;
                      padding:10px;
                      background:#111;
                      color:white;
                      border:1px solid rgba(255,213,0,0.2);
                      border-radius:6px;
                      margin-bottom:10px;">

        <label style="color:#ccc;">Текст (EN)</label>
        <textarea name="content_en" rows="5"
                  required
                  style="width:100%;
                         padding:10px;
                         background:#111;
                         color:white;
                         border:1px solid rgba(255,213,0,0.2);
                         border-radius:6px;"></textarea>
    </fieldset>

    <!-- BUTTON -->
    <button type="submit"
            style="background:#ffd500;
                   color:black;
                   border:none;
                   padding:15px;
                   font-weight:900;
                   border-radius:8px;
                   cursor:pointer;
                   font-size:16px;
                   box-shadow:0 0 20px rgba(255,213,0,0.3);">

        Сохранить

    </button>

</form>
{% endblock %}
